name: Daily CyberSec Streak & Deploy

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:
    branches: ["main"]
    # SECURITY: Only trigger on push if these specific core files change
    # Prevents infinite loops when the bot commits daily content
    paths:
      - 'index.html'
      - 'generate_content.py'
      - '.github/workflows/**'

# SECURITY: Default to read-only for the entire workflow (Principle of Least Privilege)
permissions: read-all

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    
    # SECURITY: Grant write permissions ONLY to this specific job that needs it
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Daily Content
        run: python generate_content.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # SECURITY: Only stage the exact folders/files the Python script creates.
          # This prevents accidental commits of temporary runner files.
          git add 01-Security-Tips/ 02-Vulnerabilities/ 03-Tools/ dashboard_data.json || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🛡️ Daily CyberSec update: $(date +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
