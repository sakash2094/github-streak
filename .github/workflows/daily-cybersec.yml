name: Daily CyberSec Streak & Deploy

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - 'index.html'
      - 'generate_content.py'
      - '.github/workflows/**'

permissions: read-all

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Daily Content
        run: python generate_content.py

      - name: Commit and push changes
        run: |
          git config user.name "sakash2094"
          git config user.email "sakash2094@gmail.com"
          git add . || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🛡️ Daily CyberSec: $(date +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
