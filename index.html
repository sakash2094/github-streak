<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- Security Headers via Meta Tags -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';">
  <meta name="description" content="Daily Cybersecurity Insights & Contribution Tracker - Automated security tips, vulnerabilities, and tools">
  <meta name="robots" content="index, follow">
  
  <title>CyberSec Streak Dashboard | Daily Security Insights</title>
  
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-hover: #1c2128;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --green-dark: #26a641;
      --yellow: #d29922;
      --red: #f85149;
      --g0: #161b22;
      --g1: #0e4429;
      --g2: #006d32;
      --g3: #26a641;
      --g4: #39d353;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Header Styles */
    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 10px 0;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 400;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .stat-value {
      font-size: 3rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* Card Component */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 30px;
    }

    .card h2 {
      margin: 0 0 20px 0;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Heatmap */
    .heatmap-container {
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .heatmap {
      display: grid;
      grid-template-rows: repeat(7, 12px);
      grid-auto-flow: column;
      grid-auto-columns: 12px;
      gap: 3px;
      margin-top: 15px;
    }

    .cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: var(--g0);
      outline: 1px solid rgba(255,255,255,0.02);
      transition: transform 0.1s;
    }

    .cell:hover {
      transform: scale(1.5);
      outline: 2px solid var(--text);
      z-index: 10;
    }

    .cell.l1 { background: var(--g1); }
    .cell.l2 { background: var(--g2); }
    .cell.l3 { background: var(--g3); }
    .cell.l4 { background: var(--g4); }

    .legend {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 15px;
      justify-content: flex-end;
    }

    .legend .cell {
      width: 10px;
      height: 10px;
      outline: none;
    }

    /* Content Display */
    .content-category {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
    }

    .cat-tips {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    .cat-vulns {
      background: rgba(248, 81, 73, 0.15);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .cat-tools {
      background: rgba(210, 153, 34, 0.15);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, 0.3);
    }

    .content-body {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text);
    }

    .content-body strong {
      color: var(--accent);
      font-weight: 600;
    }

    .content-body code {
      background: rgba(110, 118, 129, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.9em;
      color: var(--accent);
    }

    .content-body pre {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 15px 0;
    }

    .content-body pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .content-footer {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    /* Loading & Error States */
    .loading {
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
      padding: 60px 20px;
    }

    .error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 20px;
      color: var(--red);
      text-align: center;
    }

    .error strong {
      display: block;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.875rem;
      }
      
      .stat-value {
        font-size: 2.25rem;
      }
      
      .card {
        padding: 20px;
      }
      
      body {
        padding: 10px;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card, .card {
      animation: fadeIn 0.5s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛡️ CyberSec Streak</h1>
      <p class="subtitle">Automated Daily Security Insights & Contribution Tracker</p>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="current-streak" aria-label="Current streak in days">0</div>
        <div class="stat-label">Current Streak 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-days" aria-label="Total active days">0</div>
        <div class="stat-label">Total Days Active</div>
      </div>
    </div>

    <div class="card">
      <h2>📅 Contribution Heatmap</h2>
      <div class="heatmap-container">
        <div class="heatmap" id="heatmap" role="img" aria-label="Contribution heatmap for the past year"></div>
      </div>
      <div class="legend">
        <span>Less</span>
        <div class="cell"></div>
        <div class="cell l1"></div>
        <div class="cell l2"></div>
        <div class="cell l3"></div>
        <div class="cell l4"></div>
        <span>More</span>
      </div>
    </div>

    <div class="card">
      <h2>💡 Today's CyberSec Insight</h2>
      <div id="daily-content" class="loading" role="status" aria-live="polite">
        Loading today's insight...
      </div>
    </div>

    <footer>
      <p>Built with ❤️ for cybersecurity enthusiasts</p>
      <p>Automated daily updates via GitHub Actions</p>
    </footer>
  </div>

  <script>
    /**
     * CyberSec Streak Dashboard
     * Secure, client-side rendering of GitHub contribution data
     */

    // Security: Content Security Policy enforcement
    (function() {
      'use strict';
      
      // Prevent XSS by sanitizing all user-generated content
      function sanitizeHTML(str) {
        if (typeof str !== 'string') return '';
        
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Safe HTML parser that only allows specific tags
      function parseSafeHTML(text) {
        if (!text) return '';
        
        // First escape all HTML
        let safe = sanitizeHTML(text);
        
        // Then selectively allow safe formatting
        safe = safe
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.*?)`/g, '<code>$1</code>')
          .replace(/\n\n/g, '</p><p>')
          .replace(/\n/g, '<br>');
        
        return '<p>' + safe + '</p>';
      }

      // Fetch and parse JSON data securely
      async function fetchDashboardData() {
        try {
          const response = await fetch('./dashboard_data.json', {
            method: 'GET',
            headers: {
              'Accept': 'application/json',
              'Cache-Control': 'no-cache'
            }
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          
          // Validate data structure
          if (!data || typeof data !== 'object') {
            throw new Error('Invalid data format');
          }

          return data;
        } catch (error) {
          console.error('Error fetching dashboard data:', error);
          throw new Error('Failed to load dashboard data. Please refresh the page.');
        }
      }

      // Render contribution heatmap
      function renderHeatmap(dates) {
        const heatmap = document.getElementById('heatmap');
        if (!heatmap || !Array.isArray(dates)) return;

        heatmap.innerHTML = '';
        const dateSet = new Set(dates);
        
        const today = new Date();
        const startDate = new Date();
        startDate.setFullYear(today.getFullYear() - 1);
        startDate.setDate(startDate.getDate() - startDate.getDay()); // Start from Sunday

        let currentDate = new Date(startDate);
        const endDate = new Date(today);
        endDate.setDate(endDate.getDate() + 1);

        while (currentDate < endDate) {
          const dateStr = currentDate.toISOString().split('T')[0];
          const cell = document.createElement('div');
          cell.className = 'cell';
          
          const hasContribution = dateSet.has(dateStr);
          if (hasContribution) {
            cell.classList.add('l4');
          }
          
          // Accessibility
          cell.setAttribute('role', 'img');
          cell.setAttribute('aria-label', `${dateStr}: ${hasContribution ? '1 contribution' : '0 contributions'}`);
          cell.title = `${dateStr}: ${hasContribution ? '1 contribution' : '0'}`;
          
          heatmap.appendChild(cell);
          currentDate.setDate(currentDate.getDate() + 1);
        }
      }

      // Render daily content securely
      function renderContent(content) {
        const container = document.getElementById('daily-content');
        if (!container) return;

        if (!content || !content.title || !content.content) {
          container.innerHTML = '<div class="error"><strong>No Content Available</strong><p>Content will be generated on the next scheduled run.</p></div>';
          return;
        }

        // Determine category styling
        let categoryClass = 'cat-tips';
        let categoryIcon = '💡';
        const category = content.category ? content.category.toLowerCase() : 'tips';
        
        if (category === 'vulnerabilities') {
          categoryClass = 'cat-vulns';
          categoryIcon = '🛡️';
        } else if (category === 'tools') {
          categoryClass = 'cat-tools';
          categoryIcon = '🛠️';
        }

        // Create elements safely (no innerHTML with user data)
        container.innerHTML = '';

        // Category badge
        const categorySpan = document.createElement('span');
        categorySpan.className = `content-category ${categoryClass}`;
        categorySpan.textContent = `${categoryIcon} ${sanitizeHTML(content.category || 'Content')}`;
        container.appendChild(categorySpan);

        // Title
        const titleH3 = document.createElement('h3');
        titleH3.style.marginTop = '0';
        titleH3.style.marginBottom = '20px';
        titleH3.style.color = 'var(--text)';
        titleH3.style.fontSize = '1.5rem';
        titleH3.textContent = sanitizeHTML(content.title);
        container.appendChild(titleH3);

        // Content body with safe HTML parsing
        const contentBody = document.createElement('div');
        contentBody.className = 'content-body';
        contentBody.innerHTML = parseSafeHTML(content.content);
        container.appendChild(contentBody);

        // Footer with date
        const footer = document.createElement('div');
        footer.className = 'content-footer';
        const dateStr = content.date ? sanitizeHTML(content.date) : 'Unknown date';
        footer.innerHTML = `<strong>Generated on:</strong> ${dateStr}`;
        container.appendChild(footer);
      }

      // Update statistics
      function updateStats(data) {
        const currentStreakEl = document.getElementById('current-streak');
        const totalDaysEl = document.getElementById('total-days');

        if (currentStreakEl) {
          currentStreakEl.textContent = data.current_streak || 0;
          currentStreakEl.setAttribute('aria-label', `Current streak: ${data.current_streak || 0} days`);
        }

        if (totalDaysEl) {
          totalDaysEl.textContent = data.total_contributions || 0;
          totalDaysEl.setAttribute('aria-label', `Total contributions: ${data.total_contributions || 0} days`);
        }
      }

      // Main initialization function
      async function init() {
        try {
          const data = await fetchDashboardData();
          
          // Update all components
          updateStats(data);
          renderHeatmap(data.dates || []);
          renderContent(data.latest_content);

          console.log('✅ Dashboard loaded successfully');
          console.log(`📊 Stats: ${data.current_streak || 0} day streak, ${data.total_contributions || 0} total contributions`);

        } catch (error) {
          console.error('Initialization error:', error);
          
          const contentContainer = document.getElementById('daily-content');
          if (contentContainer) {
            contentContainer.innerHTML = `
              <div class="error">
                <strong>⚠️ Dashboard Loading Error</strong>
                <p>${sanitizeHTML(error.message)}</p>
                <p style="margin-top: 10px; font-size: 0.9rem;">
                  Make sure the GitHub Actions workflow has run at least once.
                  <br>Try refreshing the page in a few minutes.
                </p>
              </div>
            `;
          }
        }
      }

      // Initialize when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Auto-refresh every 5 minutes
      setInterval(init, 5 * 60 * 1000);

    })();
  </script>
</body>
</html>
