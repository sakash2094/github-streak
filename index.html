<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberSec Streak Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --g0: #161b22; --g1: #0e4429;
    --g2: #006d32; --g3: #26a641; --g4: #39d353;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
  .container { max-width: 900px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-size: 2.5rem; margin: 0; color: var(--text); }
  .subtitle { color: var(--muted); font-size: 1.1rem; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; }
  .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--green); }
  .stat-label { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 30px; }
  .card h2 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; align-items: center; gap: 10px;}
  
  .heatmap-container { overflow-x: auto; }
  .heatmap { display: grid; grid-template-rows: repeat(7, 12px); grid-auto-flow: column; grid-auto-columns: 12px; gap: 3px; margin-top: 15px; }
  .cell { width: 12px; height: 12px; border-radius: 2px; background: var(--g0); outline: 1px solid rgba(255,255,255,0.02); }
  .cell.l4 { background: var(--g4); }
  .legend { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--muted); margin-top: 10px; justify-content: flex-end; }
  .legend .cell { width: 10px; height: 10px; }

  .content-category { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px;}
  .cat-tips { background: rgba(88, 166, 255, 0.2); color: var(--accent); }
  .cat-vulns { background: rgba(248, 81, 73, 0.2); color: #f85149; }
  .cat-tools { background: rgba(210, 153, 34, 0.2); color: #d29922; }
  
  .content-body { font-size: 1.1rem; line-height: 1.7; color: var(--text); }
  .content-body code { background: #2d333b; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
  
  .loading { text-align: center; color: var(--muted); font-style: italic; padding: 40px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🛡️ CyberSec Streak</h1>
    <p class="subtitle">Automated Daily Security Insights & Contribution Tracker</p>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="current-streak">0</div>
      <div class="stat-label">Current Streak 🔥</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="longest-streak">0</div>
      <div class="stat-label">Longest Streak 🏆</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="total-days">0</div>
      <div class="stat-label">Total Days Active</div>
    </div>
  </div>

  <div class="card">
    <h2>📅 Contribution Heatmap</h2>
    <div class="heatmap-container">
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="legend">
      Less <div class="cell"></div> <div class="cell l4"></div> More
    </div>
  </div>

  <div class="card">
    <h2>💡 Today's CyberSec Insight</h2>
    <div id="daily-content" class="loading">Loading today's insight...</div>
  </div>
</div>

<script>
  async function init() {
    try {
      const response = await fetch('./dashboard_data.json');
      if (!response.ok) throw new Error('Data file not found. Has the workflow run yet?');
      const data = await response.json();

      document.getElementById('current-streak').innerText = data.current_streak || 0;
      document.getElementById('longest-streak').innerText = data.longest_streak || 0;
      document.getElementById('total-days').innerText = data.total_contributions || 0;

      renderHeatmap(data.dates || []);
      renderContent(data.latest_content);

    } catch (error) {
      document.getElementById('daily-content').innerHTML = `<p style="color: #f85149;">Error: ${error.message}. Trigger the workflow manually to start!</p>`;
    }
  }

  function renderHeatmap(dates) {
    const heatmap = document.getElementById('heatmap');
    heatmap.innerHTML = '';
    const dateSet = new Set(dates);
    const today = new Date();
    const startDate = new Date();
    startDate.setFullYear(today.getFullYear() - 1);
    startDate.setDate(startDate.getDate() - startDate.getDay());

    let currentDate = new Date(startDate);
    while (currentDate <= today) {
      const dateStr = currentDate.toISOString().split('T')[0];
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (dateSet.has(dateStr)) cell.classList.add('l4');
      cell.title = `${dateStr}: ${dateSet.has(dateStr) ? '1 contribution' : '0'}`;
      heatmap.appendChild(cell);
      currentDate.setDate(currentDate.getDate() + 1);
    }
  }

  function renderContent(content) {
    const container = document.getElementById('daily-content');
    if (!content || !content.title) {
      container.innerHTML = '<p>No content generated yet.</p>';
      return;
    }

    let catClass = 'cat-tips'; let catIcon = '💡';
    if (content.category === 'vulnerabilities') { catClass = 'cat-vulns'; catIcon = '🛡️'; }
    if (content.category === 'tools') { catClass = 'cat-tools'; catIcon = '🛠️'; }

    let htmlContent = content.content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.*?)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');

    container.innerHTML = `
      <span class="content-category ${catClass}">${catIcon} ${content.category}</span>
      <h3 style="margin-top:0; color: #fff;">${content.title}</h3>
      <div class="content-body">${htmlContent}</div>
      <p style="color: var(--muted); font-size: 0.9rem; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
        Generated on: ${content.date}
      </p>
    `;
  }

  init();
</script>
</body>
</html>
